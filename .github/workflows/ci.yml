name: CI

# Install from the lockfile, then type-check, lint, and build on every push to
# main and every PR into it. Catches type/format/build regressions early.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install (locked)
        run: npm ci

      - name: Type-check
        run: npm run check

      - name: Lint + format check
        run: npm run lint

      - name: Build
        run: npm run build
